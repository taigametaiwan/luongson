name: Quet Hygenie HLS FLV v1.0.2

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hygenie-m3u-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 1. Lay code tu kho ve
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Cai dat Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Cai dat Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: 4. Quet Hygenie va hien log realtime
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          HYGENIE_MATCH_CONCURRENCY: "4"
          HYGENIE_HOME_WAIT_MS: "6000"
          HYGENIE_ROOM_WAIT_SECONDS: "25"
          HYGENIE_FULL_SCAN: "1"
          HYGENIE_VERIFY_STREAMS: "1"
          HYGENIE_VERIFY_TIMEOUT_SECONDS: "8"
          HYGENIE_MAX_VERIFY_CANDIDATES: "6"
          HYGENIE_MAX_OUTPUT_STREAMS_PER_MATCH: "4"
        run: |
          set -o pipefail
          test -f main.py
          python -u main.py 2>&1 | tee hygenie_scan.log

      - name: 5. Kiem tra dau ra
        shell: bash
        run: |
          set -euo pipefail

          test -f hygenie_live.m3u
          test -f hygenie_live_pipe.m3u
          test -f hygenie_live_vlc.m3u
          test -f hygenie_debug.json

          if grep -E '^https?://.*\|User-Agent=' hygenie_live.m3u; then
            echo "::error::Playlist mac dinh khong duoc noi pipe header vao URL."
            exit 1
          fi

          python - <<'PY_AUDIT'
          import json
          from pathlib import Path

          rows = json.loads(Path("hygenie_debug.json").read_text(encoding="utf-8"))
          failures = []
          stream_count = 0

          for row in rows:
              streams = row.get("streams") or []
              stream_count += len(streams)

              if len(streams) > 4:
                  failures.append(f"Qua 4 stream: {row.get('match_name')}")

              if streams and not row.get("time"):
                  failures.append(f"Thieu gio: {row.get('match_name')}")

              for stream in streams:
                  url = stream.get("url", "")
                  state = stream.get("playability")
                  if state not in {"verified", "browser-observed"}:
                      failures.append(f"Stream chua du tin cay: {url}")

                  sources = stream.get("sources") or []
                  if (
                      "previous-playlist" in sources
                      and not stream.get("observed_active")
                      and state != "verified"
                  ):
                      failures.append(f"Link cu chua xac minh: {url}")

          if failures:
              for item in failures:
                  print(f"::error::{item}")
              raise SystemExit(1)

          print(f"Audit OK: {stream_count} stream dau ra")
          PY_AUDIT

          echo "--- Playlist mac dinh ---"
          sed -n '1,100p' hygenie_live.m3u

      - name: 6. Tai artifact debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hygenie-debug-${{ github.run_id }}
          path: |
            hygenie_live.m3u
            hygenie_live_pipe.m3u
            hygenie_live_vlc.m3u
            hygenie_debug.json
            hygenie_scan.log
            hygenie_home_debug.html
            hygenie_home_debug.png
          if-no-files-found: ignore
          retention-days: 3

      - name: 7. Luu playlist len GitHub
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- hygenie_live.m3u hygenie_live_pipe.m3u hygenie_live_vlc.m3u

          if git diff --cached --quiet; then
            echo "Playlist khong thay doi; khong can commit."
            exit 0
          fi

          git commit -m "Update verified Hygenie streams v1.0.2"
          git push origin "HEAD:${GITHUB_REF_NAME}"
